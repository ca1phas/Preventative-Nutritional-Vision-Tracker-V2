<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dashboard - Nutrition Tracker</title>
        <link rel="stylesheet" href="assets/css/styles.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <script type="module" src="/src/dashboard.js"></script>
    </head>
    <body class="dashboard-body">
        <nav class="navbar">
            <div class="navbar-container">
                <div class="navbar-brand">
                    <h1>
                        <i class="fas fa-heartbeat"></i> Nutrition Tracker - Admin Portal
                    </h1>
                    <div class="navbar-links">
                        <a href="dashboard.html" class="active">All Users</a>
                        <a href="dashboard.html?tab=daily">Daily Reports</a>
                    </div>
                </div>
                <div style="margin-left: auto; padding-left: 3rem">
                    <button id="logoutBtn" class="btn-logout">Logout</button>
                </div>
            </div>
        </nav>

        <div class="container-output">
            <div class="page-header">
                <h2>AI Nutrition Analysis Result</h2>
                <p style="color: #6b7280; margin-top: 0.5rem">
                    View the detailed nutrition analysis for the submitted meal
                </p>
            </div>

            <div class="container">

                <div id="mealImageContainer" class="meal-image"></div>
                <div id="basicInfo" class="meal-info"></div>
                <div class="divider"></div>

                <h2>Nutrition Table</h2>

                <div class="table-container">
                <table id="nutritionTable">
                    <thead>
                    <tr>
                        <th>Nutrient</th>
                        <th>Value</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                </div>

                <div id="aiSummary" class="summary"></div>

                <button class="back-btn" onclick="history.back()">
                    Back
                </button>
            </div>
        </div>
        <script src="src/output.js"></script></body>
    </body>
</html>
