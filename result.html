<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analysis Result - Nutrition Tracker</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script type="module" src="/src/result.js"></script>
  </head>
  <body class="dashboard-body">
    <nav class="navbar">
      <div class="navbar-container">
        <div class="navbar-brand">
          <h1><i class="fas fa-heartbeat"></i> Nutrition Tracker</h1>
          <div class="navbar-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="upload.html">Upload Meal</a>
          </div>
        </div>
        <div style="margin-left: auto">
          <button id="logoutBtn" class="ubtn-logot">Logout</button>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="page-header">
        <h2>Nutrition Analysis Result</h2>
      </div>

      <div id="statusAlert" class="status-banner"></div>

      <div class="upload-card">
        <h3
          style="
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #374151;
          "
        >
          Detected Ingredients:
        </h3>
        <ul id="ingredientList" class="ingredient-list"></ul>

        <h3
          style="
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #374151;
          "
        >
          Nutritional Information:
        </h3>
        <div class="nutrition-grid">
          <div class="nutrition-card calories">
            <p>Calories</p>
            <p id="calories">-</p>
          </div>
          <div class="nutrition-card protein">
            <p>Protein</p>
            <p id="protein">-</p>
          </div>
          <div class="nutrition-card carbs">
            <p>Carbohydrates</p>
            <p id="carbs">-</p>
          </div>
          <div class="nutrition-card fats">
            <p>Fats</p>
            <p id="fats">-</p>
          </div>
        </div>
      </div>

      <div class="button-group" style="max-width: 700px; margin: 2rem auto 0">
        <a
          href="dashboard.html"
          id="backToDashboard"
          class="btn btn-primary"
          style="text-decoration: none; display: block; text-align: center"
        >
          ← Back to Dashboard
        </a>
        <a
          href="upload.html"
          class="btn btn-secondary"
          style="text-decoration: none; display: block; text-align: center"
        >
          Upload Another Meal
        </a>
      </div>
    </div>
  </body>
</html>
