<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Profile - Nutrition Tracker</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script type="module" src="/src/userProfile.js"></script>
  </head>
  <body class="dashboard-body">
    <nav class="navbar">
      <div class="navbar-container">
        <div class="navbar-brand">
          <h1><i class="fas fa-heartbeat"></i> Nutrition Tracker</h1>
          <div class="navbar-links">
            <a href="userProfile.html" id="profileTab" class="active"
              >Profile</a
            >
            <a href="userDashboard.html" id="dashboardTab"
              >Dashboard</a
            >
            <a href="history.html" id="historyTab">History</a>
            <a href="upload.html">Upload Meal</a>
            <a href="index.html">Homepage</a>
          </div>
        </div>
        <div style="margin-left: auto; padding-left: 3rem">
          <button id="logoutBtn" class="btn-logout">Logout</button>
        </div>
      </div>
    </nav>

    <div class="container">
      <!-- Profile Panel -->
      <div id="profilePanel" class="panel-content">
        <div class="page-header">
          <h2><i class="fas fa-user-circle"></i> User Profile</h2>
          <p style="color: #6b7280; margin-top: 0.5rem">
            Manage your personal information and health data
          </p>
          <p
            id="currentUserDisplay"
            style="
              color: #667eea;
              font-weight: 700;
              font-size: 1.125rem;
              margin-top: 0.75rem;
            "
          ></p>
        </div>

        <div class="profile-card">
          <form id="profileForm">
            <div class="form-grid">
              <div class="form-group">
                <label for="userName"
                  ><i class="fas fa-user"></i> Full Name</label
                >
                <input
                  type="text"
                  id="userName"
                  placeholder="Enter your name"
                  required
                />
              </div>

              <div class="form-group">
                <label for="userAge"
                  ><i class="fas fa-birthday-cake"></i> Age</label
                >
                <input
                  type="number"
                  id="userAge"
                  placeholder="Enter your age"
                  required
                  min="1"
                  max="150"
                />
              </div>

              <div class="form-group">
                <label for="userGender"
                  ><i class="fas fa-venus-mars"></i> Gender</label
                >
                <select id="userGender" required>
                  <option value="">Select gender</option>
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                  <option value="other">Other</option>
                </select>
              </div>

              <div class="form-group">
                <label for="userWeight"
                  ><i class="fas fa-weight"></i> Weight (kg)</label
                >
                <input
                  type="number"
                  id="userWeight"
                  placeholder="Enter weight"
                  required
                  step="0.1"
                  min="1"
                />
              </div>

              <div class="form-group">
                <label for="userHeight"
                  ><i class="fas fa-ruler-vertical"></i> Height (cm)</label
                >
                <input
                  type="number"
                  id="userHeight"
                  placeholder="Enter height"
                  required
                  step="0.1"
                  min="1"
                />
              </div>

              <div class="form-group">
                <label for="userBMI"
                  ><i class="fas fa-calculator"></i> BMI</label
                >
                <input
                  type="text"
                  id="userBMI"
                  readonly
                  placeholder="Auto-calculated"
                />
              </div>
            </div>

            <div class="form-group">
              <label for="medicalNotes"
                ><i class="fas fa-notes-medical"></i> Medical Notes</label
              >
              <textarea
                id="medicalNotes"
                rows="4"
                placeholder="Enter any medical conditions, allergies, or dietary restrictions"
              ></textarea>
            </div>

            <div class="button-group">
              <button type="submit" class="btn btn-success">
                <i class="fas fa-save"></i> Save Profile
              </button>
              <button
                type="button"
                class="btn btn-secondary"
                onclick="loadUserProfile()"
              >
                <i class="fas fa-undo"></i> Reset
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
